version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sipakta-app
    container_name: sipakta-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sipakta-net

  webserver:
    image: nginx:alpine
    container_name: sipakta-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sipakta-net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: sipakta-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-kua_arsip}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sipakta-net

  meilisearch:
    image: getmeili/meilisearch:v1.12.0
    container_name: sipakta-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterKey123!}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - sipakta-net

networks:
  sipakta-net:
    driver: bridge

volumes:
  dbdata:
  meilisearch_data:
